name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libglpk-dev libxml2-dev seq-gen
        shell: bash

      - name: Install R Dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck", "knitr", "rmarkdown"))
          remotes::install_deps(dependencies = TRUE)
          if (!requireNamespace("TransPhylo", quietly = TRUE)) {
            remotes::install_github("xavierdidelot/TransPhylo")
          }
        shell: Rscript {0}

      - name: Check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
