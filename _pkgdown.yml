url: https://lliu1871.github.io/transNetwork
template:
  bootstrap: 5
  bootswatch: morph  # Optional: 'morph' or 'zephyr' are clean for academic work
  params:
    logo: man/figures/logo.png
navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
  components:
    intro:
      text: Get Started
      href: index.html
home:
  links:
    - text: betnet (Julia Inference)
      href: https://github.com/lliu1871/betnet
    - text: J. Math. Biol. 2025 Paper
      href: https://doi.org/10.1007/s00285-025-02193-1
      
reference:
  - title: Simulation
    desc: Functions for generating stochastic outbreaks and trees.
    contents:
      - simulate_outbreak
      - build_timetree
      - sim_phytree
      - add_coalescent_distance
  - title: Analysis & Metrics
    desc: Tools for summarizing MCMC output and calculating distances.
    contents:
      - summary_betnet
      - find_mrci
      - find_infectors
      - find_all_pairwise_distances
  - title: Data Conversion
    desc: Internal utilities for formatting and transforming data.
    contents:
      - transmission_edges_matrixwiw 
      - ttree_from_transmission      
  - title: Visualization
    desc: Plotting transmission networks and timelines.
    contents:
      - transplot
      
